<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אופציות לוגו — היחידה לטיפול זוגי ומשפחתי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Heebo', sans-serif; background: #f5f5f5; padding: 40px 20px; direction: rtl; }
h1 { text-align: center; color: #0d5e6b; margin-bottom: 10px; }
p.sub { text-align: center; color: #666; margin-bottom: 40px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; max-width: 1000px; margin: 0 auto; }
.card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 15px rgba(0,0,0,0.08); text-align: center; }
.card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
.card h3 { padding: 15px 15px 5px; color: #0d5e6b; font-size: 18px; }
.card p { padding: 0 15px 20px; color: #888; font-size: 14px; }
</style>
</head>
<body>
<h1>אופציות לסמל היחידה</h1>
<p class="sub">בחרו את האופציה המועדפת — או שלחו הערות לשיפור</p>
<div class="grid">
  <div class="card">
    <img src="logo-option-1.jpg" alt="אופציה 1">
    <h3>אופציה 1</h3>
    <p>עיגולים חופפים עם לב — חיבור וזוגיות</p>
  </div>
  <div class="card">
    <img src="logo-option-2.jpg" alt="אופציה 2">
    <h3>אופציה 2</h3>
    <p>עץ עם ענפים שלובים — משפחה וצמיחה</p>
  </div>
  <div class="card">
    <img src="logo-option-3.jpg" alt="אופציה 3">
    <h3>אופציה 3</h3>
    <p>פרופילים פונים זה לזה — זוג ומשפחה</p>
  </div>
  <div class="card">
    <img src="logo-option-4.jpg" alt="אופציה 4">
    <h3>אופציה 4</h3>
    <p>ידיים מושטות — חיבור וריפוי</p>
  </div>
  <div class="card">
    <img src="logo-option-5.jpg" alt="אופציה 5">
    <h3>אופציה 5</h3>
    <p>בית-לב — בית, משפחה וחום</p>
  </div>
</div>
</body>
</html>
